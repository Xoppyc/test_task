info:
  name: Log In
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:5050/api/auth/login
  body:
    type: json
    data: |-
      {
        "email": "john@test.com",
        "password": "123456"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
