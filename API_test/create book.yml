info:
  name: create book
  type: http
  seq: 10

http:
  method: POST
  url: http://localhost:5050/api/books/
  body:
    type: json
    data: |-
      {
        "name": "Silly Samuel",
        "author": "mystery man ",
        "pageCount": 143 
      }
  auth:
    type: bearer
    token: "{{adminToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
